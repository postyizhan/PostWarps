warp.help.create=&7/warp create <n> [description] &f- Create a new warp
warp.help.delete=&7/warp delete <n> &f- Delete a warp
warp.help.list=&7/warp list [page] &f- List your warps
warp.help.teleport=&7/warp teleport <n> &f- Teleport to a warp
warp.help.info=&7/warp info <n> &f- View warp information
warp.help.reload=&7/warp reload &f- Reload plugin configuration
warp.help.update=&7/warp update &f- Check for plugin updates

